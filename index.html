<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Seguimiento en Vivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { font-family: Arial; text-align: center; }
        #map { height: 500px; margin: 10px; }
        input, button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>

<h2>📍 Seguimiento en Vivo</h2>

<input type="text" id="nombre" placeholder="Tu nombre o ID">
<br>
<button onclick="iniciar()">Iniciar</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([13.6929, -89.2182], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let lat = null;
let lng = null;
let markers = {};
let URL = "https://script.google.com/macros/s/AKfycbw7mkULntsFH1j7f5ytwzEViuIummoyGFrsvh75VBWohXGb44as7PQOyaQg76VVXjms/exec"; // 👈 IMPORTANTE

// Obtener ubicación
function obtenerUbicacion() {
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
        },
        (err) => {
            alert("Error GPS: " + err.message);
        }
    );
}

// Enviar ubicación
function enviar() {
    let nombre = document.getElementById("nombre").value;
    if (!nombre || lat === null) return;

    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            nombre: nombre,
            lat: lat,
            lng: lng
        })
    })
    .then(r => r.json())
    .then(d => console.log("Enviado:", d))
    .catch(err => console.error(err));
}

// Cargar usuarios
function cargar() {
    fetch(URL)
    .then(r => r.json())
    .then(data => {

        for (let i = 1; i < data.length; i++) {

            let nombre = data[i][1];
            let lat = parseFloat(data[i][2]);
            let lng = parseFloat(data[i][3]);

            if (!lat || !lng) continue;

            if (markers[nombre]) {
                markers[nombre].setLatLng([lat, lng]);
            } else {
                let m = L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup(nombre);

                markers[nombre] = m;
            }
        }
    });
}

// Iniciar sistema
function iniciar() {

    let nombre = document.getElementById("nombre").value;

    if (!nombre) {
        alert("Escribe tu nombre");
        return;
    }

    alert("Seguimiento iniciado");

    setInterval(obtenerUbicacion, 3000);
    setInterval(enviar, 5000);
    setInterval(cargar, 5000);
}
</script>

</body>
</html>
